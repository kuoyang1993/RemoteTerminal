<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
#terminal { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="terminal"></div>
<script>
let term;
let fitAddon;

function initTerminal() {
    term = new Terminal({
        cursorBlink: true,
        cursorStyle: 'block',
        fontSize: 14,
        fontFamily: 'Consolas, "Courier New", "Microsoft YaHei", monospace',
        theme: {
            background: '#1e1e1e',
            foreground: '#d4d4d4',
            cursor: '#ffffff',
            selectionBackground: '#264f78',
            black: '#000000',
            red: '#cd3131',
            green: '#0dbc79',
            yellow: '#e5e510',
            blue: '#2472c8',
            magenta: '#bc3fbc',
            cyan: '#11a8cd',
            white: '#e5e5e5',
            brightBlack: '#666666',
            brightRed: '#f14c4c',
            brightGreen: '#23d18b',
            brightYellow: '#f5f543',
            brightBlue: '#3b8eea',
            brightMagenta: '#d670d6',
            brightCyan: '#29b8db',
            brightWhite: '#ffffff'
        },
        allowProposedApi: true,
        scrollback: 5000,
        tabStopWidth: 4
    });

    if (typeof FitAddon !== 'undefined') {
        fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
    }

    term.open(document.getElementById('terminal'));

    if (fitAddon) {
        fitAddon.fit();
    }

    // 用户输入 -> Java
    term.onData(function(data) {
        try {
            if (window.terminalBridge) {
                window.terminalBridge.onTerminalInput(data);
            }
        } catch(e) {}
    });

    // 终端标题变更
    term.onTitleChange(function(title) {
        try {
            if (window.terminalBridge) {
                window.terminalBridge.onTitleChange(title);
            }
        } catch(e) {}
    });

    // 监听窗口大小变化
    window.addEventListener('resize', function() {
        if (fitAddon) {
            fitAddon.fit();
            try {
                if (window.terminalBridge) {
                    window.terminalBridge.onTerminalResize(term.cols, term.rows);
                }
            } catch(e) {}
        }
    });
}

// Java 调用此函数写入终端
window.writeToTerminal = function(data) {
    if (term) {
        term.write(data);
    }
};

// Java 调用此函数清屏
window.clearTerminal = function() {
    if (term) {
        term.clear();
    }
};

// Java 调用此函数清除回滚
window.clearScrollback = function() {
    if (term) {
        term.clearTextureAtlas ? term.clearTextureAtlas() : null;
        term.reset();
    }
};

// Java 调用此函数复制选中内容
window.copySelection = function() {
    if (term) {
        var sel = term.getSelection();
        if (sel) {
            return sel;
        }
    }
    return '';
};

// Java 调用此函数获取终端尺寸
window.getTerminalSize = function() {
    if (term) {
        return JSON.stringify({cols: term.cols, rows: term.rows});
    }
    return JSON.stringify({cols: 80, rows: 24});
};

// Java 调用此函数调整终端大小
window.resizeTerminal = function(cols, rows) {
    if (term) {
        term.resize(cols, rows);
    }
};

// Java 调用此函数粘贴文本
window.pasteToTerminal = function(text) {
    if (term && text) {
        term.write(text);
    }
};

// 页面加载完成后初始化
window.onload = function() {
    initTerminal();
};
</script>
</body>
</html>
